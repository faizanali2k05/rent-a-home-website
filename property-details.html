<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Property Details - Rent a Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="index.html">Rent a Home</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
      </ul>
      <div id="nav-auth" class="d-flex"></div>
    </div>
  </div>
</nav>
<section class="container py-3 py-md-4">
  <div id="content"></div>
  <script type="module">
  import { initNavbar, generateInvoice } from './js/app.js';
  import { getPropertyById } from './js/properties.js';
  import { getLocalUser } from './js/auth.js';
  import { createBooking, fetchBookingsForUser } from './js/bookings.js';
  import { fetchReviews, addReview } from './js/reviews.js';

  initNavbar();
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const content = document.getElementById('content');

  async function renderReviews() {
    const list = document.getElementById('reviews-list');
    if(!list) return;
    try {
      const revs = await fetchReviews(id);
      if(!revs.length) { list.innerHTML = '<p class="small text-muted">No reviews yet.</p>'; return; }
      list.innerHTML = revs.map(r => `
        <div class="mb-3 border-bottom pb-3">
          <div class="d-flex justify-content-between">
            <span class="fw-bold small">${r.profiles?.full_name || 'Verified Resident'}</span>
            <span class="rating-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
          </div>
          <div class="small text-muted mt-1">${r.comment || ''}</div>
        </div>
      `).join('');
    } catch(e) { list.innerHTML = 'Error loading reviews'; }
  }

  (async ()=>{
    if(!id){ content.innerHTML = '<div class="alert alert-danger">Missing property id</div>'; return; }
    try{
      const p = await getPropertyById(id);
      if(!p) { content.innerHTML = '<div class="alert alert-warning">Property not found</div>'; return; }
      
      const user = getLocalUser();
      const isOwner = user && user.id === p.owner;
      
      let residentBooking = null;
      if(user && !isOwner) {
        const myBookings = await fetchBookingsForUser(user.id);
        residentBooking = myBookings.find(b => b.property_id === p.id && b.status === 'approved' && b.is_paid);
      }

      const mainImg = p.image_url || 'https://images.unsplash.com/photo-1568605114967-8130f3a36994?auto=format&fit=crop&q=80&w=1000';
      const media = mainImg ? `<img src="${mainImg}" class="img-fluid rounded-3 mb-3 w-100" style="height:300px; object-fit:cover;" alt="Property">` : `<div class="no-image d-flex align-items-center justify-content-center mb-3" style="height:300px;"><h3>No image available</h3></div>`;

      content.innerHTML = `
        <div class="row g-3 g-md-4">
          <div class="col-lg-7 col-12">
            ${media}
            <div class="d-flex justify-content-between align-items-start mb-3 flex-column flex-sm-row gap-2">
              <div>
                <h3 class="fw-bold">${p.title}</h3>
                <div class="small-muted">${p.city} • ${p.bedrooms} bed • ${p.bathrooms} bath</div>
              </div>
              <div class="flex-shrink-0"><span class="price-badge">$${p.price}</span></div>
            </div>
            <p class="mt-3 text-muted">${p.description || ''}</p>
            <div class="card-amenities mb-4">${(p.amenities||[]).map(a=>`<span class="amenity-badge">${a}</span>`).join('')}</div>
            <hr class="my-4">
            <h5 class="fw-bold mb-3">Reviews</h5>
            <div id="reviews-list"></div>
            ${isOwner ? '' : `
            <h5 class="fw-bold mt-4 mb-3">Request Booking</h5>
            <form id="booking-form" class="mb-3">
              <div class="row g-2">
                <div class="col-12 col-sm-6"><input type="date" id="start" class="form-control" placeholder="Start Date" required></div>
                <div class="col-12 col-sm-6"><input type="date" id="end" class="form-control" placeholder="End Date" required></div>
              </div>
              <textarea id="message" class="form-control mt-3" placeholder="Message to owner..."  rows="3"></textarea>
              <button type="submit" class="btn btn-primary w-100 mt-3">Submit Request</button>
              <div id="booking-msg"></div>
            </form>
            `}
            ${residentBooking ? `<button id="btn-invoice" class="btn btn-success w-100">Generate Invoice</button>` : ''}
          </div>
          <div class="col-lg-5 col-12">
            <div class="card shadow-sm border-0 mb-3">
              <div class="card-body">
                <h5 class="fw-bold mb-3">Property Details</h5>
                <div class="mb-3 pb-3 border-bottom">
                  <strong class="d-block text-muted small mb-1">Price</strong>
                  <span class="fs-5 text-primary">$${p.price}/month</span>
                </div>
                <div class="mb-3 pb-3 border-bottom">
                  <strong class="d-block text-muted small mb-1">Location</strong>
                  <span>${p.city}</span>
                </div>
                <div class="mb-3 pb-3 border-bottom">
                  <strong class="d-block text-muted small mb-1">Address</strong>
                  <span>${p.address || 'N/A'}</span>
                </div>
                <div class="mb-3 pb-3 border-bottom">
                  <strong class="d-block text-muted small mb-1">Bedrooms</strong>
                  <span>${p.bedrooms}</span>
                </div>
                <div>
                  <strong class="d-block text-muted small mb-1">Bathrooms</strong>
                  <span>${p.bathrooms}</span>
                </div>
              </div>
            </div>
            ${!isOwner ? `<div class="card shadow-sm border-0">
              <div class="card-body">
                <h5 class="fw-bold mb-3">Leave a Review</h5>
                <form id="review-form">
                  <div class="mb-3">
                    <label class="form-label fw-500">Rating</label>
                    <select id="rating" class="form-select" required>
                      <option value="">Select rating...</option>
                      <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
                      <option value="4">⭐⭐⭐⭐ Good</option>
                      <option value="3">⭐⭐⭐ Average</option>
                      <option value="2">⭐⭐ Poor</option>
                      <option value="1">⭐ Terrible</option>
                    </select>
                  </div>
                  <textarea id="comment" class="form-control mb-3" placeholder="Your review..." rows="3"></textarea>
                  <button type="submit" class="btn btn-primary w-100">Submit Review</button>
                </form>
              </div>
            </div>` : ''}
          </div>
        </div>
      `;
      
      await renderReviews();
      if(residentBooking) document.getElementById('btn-invoice').onclick = () => generateInvoice(residentBooking, p);
      
      if(document.getElementById('review-form')){
        document.getElementById('review-form').addEventListener('submit', async (ev)=>{
          ev.preventDefault();
          if(!user){ window.location.href = 'login.html'; return; }
          const rating = parseInt(document.getElementById('rating').value);
          const comment = document.getElementById('comment').value;
          try{ 
            await addReview({ property_id: id, tenant_id: user.id, rating, comment }); 
            await renderReviews(); 
            document.getElementById('review-form').reset(); 
            alert('Review submitted!');
          } catch(e){ alert('Error: ' + e.message); }
        });
      }

      if(!isOwner && document.getElementById('booking-form')){
        document.getElementById('booking-form').addEventListener('submit', async (e)=>{
          e.preventDefault();
          if(!user){ window.location.href = 'login.html'; return; }
          const start = document.getElementById('start').value;
          const end = document.getElementById('end').value;
          const message = document.getElementById('message').value;
          try{
            await createBooking({ property_id: p.id, tenant_id: user.id, start_date: start, end_date: end, message });
            document.getElementById('booking-msg').innerHTML = '<div class="alert alert-success mt-2">Request Sent!</div>';
          }catch(err){ document.getElementById('booking-msg').innerHTML = `<div class="alert alert-danger mt-2">Error: ${err.message}</div>`; }
        });
      }
    }catch(err){ console.error('Property details error:', err); content.innerHTML = `<div class="alert alert-danger">${err.message || 'Error loading property'}</div>`; }
  })();
  </script>
</body>
</html>
