<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit Property - Rent a Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="index.html">Rent a Home</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
      </ul>
      <div id="nav-auth" class="d-flex"></div>
    </div>
  </div>
</nav>

<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <h2 class="mb-4">Edit Property Listing</h2>
      
      <form id="edit-form" class="card p-4 shadow-sm">
        <div class="mb-3">
          <label class="form-label fw-bold">Title *</label>
          <input type="text" id="title" class="form-control" required>
        </div>
        
        <div class="mb-3">
          <label class="form-label fw-bold">Description</label>
          <textarea id="description" class="form-control" rows="4"></textarea>
        </div>
        
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">City *</label>
            <input type="text" id="city" class="form-control" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Address</label>
            <input type="text" id="address" class="form-control">
          </div>
        </div>
        
        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label fw-bold">Price ($/month) *</label>
            <input type="number" id="price" class="form-control" min="0" step="0.01" required>
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label fw-bold">Bedrooms</label>
            <input type="number" id="bedrooms" class="form-control" min="0">
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label fw-bold">Bathrooms</label>
            <input type="number" id="bathrooms" class="form-control" min="0">
          </div>
        </div>
        
        <div class="mb-3">
          <label class="form-label fw-bold">Image URL</label>
          <input type="url" id="image_url" class="form-control" placeholder="https://example.com/image.jpg">
          <small class="text-muted">Provide a direct image URL. Keep the same URL or paste a new public image link.</small>
        </div>
        
        <div class="mb-3">
          <label class="form-label fw-bold">Amenities (comma-separated)</label>
          <input type="text" id="amenities" class="form-control" placeholder="WiFi, Swimming Pool, Parking, Gym">
        </div>
        
        <div class="form-check mb-3">
          <input type="checkbox" id="availability" class="form-check-input">
          <label class="form-check-label" for="availability">Available for Rent</label>
        </div>
        
        <div id="msg"></div>
        
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary btn-lg flex-grow-1">Update Listing</button>
          <a href="dashboard.html" class="btn btn-secondary btn-lg">Back</a>
        </div>
      </form>
    </div>
  </div>
</section>

<footer class="footer py-5">
  <div class="container border-top pt-4">
    <div class="row align-items-center">
      <div class="col-md-6 text-md-start mb-3 mb-md-0"><span class="h5 fw-bold text-dark me-2">Rent a Home</span><p class="text-muted small mb-0">&copy; 2024 Premium Rental Management Systems.</p></div>
      <div class="col-md-6 text-md-end"><a href="#" class="text-muted small text-decoration-none me-3">Privacy</a><a href="#" class="text-muted small text-decoration-none me-3">Terms</a><a href="#" class="text-muted small text-decoration-none">Support</a></div>
    </div>
  </div>
</footer>

<script type="module">
import { initNavbar, redirectIfNotAuth } from './js/app.js';
import { getPropertyById, updateProperty } from './js/properties.js';
import { isLandlord, getLocalUser, refreshLocalUser } from './js/auth.js';

initNavbar();

const params = new URLSearchParams(location.search);
const propertyId = params.get('id');

if(!propertyId) {
  document.getElementById('msg').innerHTML = '<div class="alert alert-danger">Missing property ID</div>';
}

(async ()=>{
  try{
    // Refresh auth to ensure session is valid
    console.log('Refreshing user session...');
    await refreshLocalUser();
    
    const user = getLocalUser();
    console.log('Current user after refresh:', user);
    
    if(!user){
      document.getElementById('msg').innerHTML = '<div class="alert alert-danger">Not authenticated. Please <a href="login.html">login</a> first.</div>';
      return;
    }
    if(!isLandlord()){
      document.getElementById('msg').innerHTML = '<div class="alert alert-warning">Only landlords can edit properties. <a href="dashboard.html">Go to Dashboard</a></div>';
      return;
    }
    
    console.log('Loading property:', propertyId);
    const property = await getPropertyById(propertyId);
    console.log('Property loaded:', property);
    
    if(!property) {
      console.error('Property not found with ID:', propertyId);
      document.getElementById('msg').innerHTML = '<div class="alert alert-danger">Property not found. <a href="dashboard.html">Return to dashboard</a></div>';
      return;
    }
    
    // Check if user is the owner
    console.log('Checking ownership:', {propertyOwner: property.owner, userId: user.id, match: property.owner === user.id});
    if(property.owner !== user.id){
      console.error('Owner mismatch. Property owner:', property.owner, 'User ID:', user.id);
      document.getElementById('msg').innerHTML = '<div class="alert alert-danger">You are not authorized to edit this property. <a href="dashboard.html">Return to dashboard</a></div>';
      return;
    }
    
    // Populate form fields
    console.log('Populating form with property data...');
    document.getElementById('title').value = property.title || '';
    document.getElementById('description').value = property.description || '';
    document.getElementById('city').value = property.city || '';
    document.getElementById('address').value = property.address || '';
    document.getElementById('price').value = property.price || '';
    document.getElementById('bedrooms').value = property.bedrooms || 1;
    document.getElementById('bathrooms').value = property.bathrooms || 1;
    document.getElementById('image_url').value = property.image_url || '';
    document.getElementById('amenities').value = (property.amenities || []).join(', ');
    document.getElementById('availability').checked = property.availability !== false;
    console.log('Form populated successfully');
    
    // Form submission
    document.getElementById('edit-form').addEventListener('submit', async (e)=>{
      e.preventDefault();
      
      const submitBtn = e.target.querySelector('button[type="submit"]');
      const originalText = submitBtn.innerText;
      submitBtn.disabled = true;
      submitBtn.innerText = '⏳ Updating...';
      
      const updates = {
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        city: document.getElementById('city').value,
        address: document.getElementById('address').value,
        price: parseFloat(document.getElementById('price').value),
        bedrooms: parseInt(document.getElementById('bedrooms').value) || 1,
        bathrooms: parseInt(document.getElementById('bathrooms').value) || 1,
        image_url: document.getElementById('image_url').value,
        amenities: document.getElementById('amenities').value.split(',').map(a => a.trim()).filter(a => a),
        availability: document.getElementById('availability').checked
      };
      
      try{
        const result = await updateProperty(propertyId, updates);
        console.log('Property updated successfully:', result);
        
        const msgDiv = document.getElementById('msg');
        msgDiv.innerHTML = '<div class="alert alert-success fw-bold">✓ Property updated! Redirecting to dashboard...</div>';
        
        // Auto-redirect to dashboard after showing success message
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1500);
      }catch(err){
        console.error('Update error:', err);
        console.error('Error details:', err.message, err.details, err.hint);
        document.getElementById('msg').innerHTML = `<div class="alert alert-danger"><strong>Error:</strong> ${err.message || 'Failed to update property'}</div>`;
        submitBtn.disabled = false;
        submitBtn.innerText = originalText;
      }
    });
  }catch(err){
    console.error('Load error:', err);
    document.getElementById('msg').innerHTML = `<div class="alert alert-danger"><strong>Error loading property:</strong><br>${err.message || err}<br><p class="small mt-2">Check browser console (F12) for details. <a href="dashboard.html">Return to dashboard</a></p></div>`;
  }
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
