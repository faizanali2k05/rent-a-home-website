<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your Dashboard - Rent a Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary"><div class="container"><a class="navbar-brand" href="index.html">Rent a Home</a><div id="nav-auth" class="ms-auto"></div></div></nav>

<section class="container py-3 py-md-4">
  <div class="row g-3 g-md-4">
    <div class="col-12 col-lg-3">
      <div class="card p-3 p-md-4 shadow-sm border-0" style="position: static;">
        <h5 class="fw-bold mb-3">Profile</h5>
        <div id="profile-info" class="mb-4 small">Loading...</div>
        <hr class="my-2">
        <a href="profile.html" class="btn btn-sm btn-outline-primary w-100 mb-2">Edit Profile</a>
        <div class="mt-4">
          <h5 class="fw-bold mb-3 small">Notifications</h5>
          <div id="notifications" class="small text-muted"></div>
        </div>
      </div>
    </div>
    <div class="col-12 col-lg-9">
      <div id="main-area" class="card p-3 p-md-4 shadow-sm border-0">
        <div class="text-center py-5"><div class="spinner-border text-primary"></div></div>
      </div>
    </div>
  </div>
</section>

<script type="module">
import { requireAuth, getLocalUser, refreshLocalUser } from './js/auth.js';
import { initNavbar, loadNotifications, generateInvoice } from './js/app.js';
import { fetchProperties, getMyProperties, deleteProperty } from './js/properties.js';
import { fetchBookingsForUser, respondBooking, payBooking, payRentByMonth, fetchPayments } from './js/bookings.js';

initNavbar();
const u = requireAuth();
let currentPayBooking = null;

async function handleBookingAction(id, status) {
  try {
    await respondBooking({ booking_id: id, status });
    location.reload();
  } catch(e) { alert(e.message); }
}

(async ()=>{
  await refreshLocalUser();
  const user = getLocalUser();
  document.getElementById('profile-info').innerHTML = `
    <div class="text-primary small fw-bold mb-1">${user.role.toUpperCase()}</div>
    <strong class="h5">${user.full_name || user.email}</strong>
  `;
  await loadNotifications('notifications');
  const main = document.getElementById('main-area');
  
  if(user.role === 'landlord'){
    main.innerHTML = `<div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2"><h4 class="fw-bold m-0">Owner Dashboard</h4><a href="add-property.html" class="btn btn-primary px-4">Add Listing</a></div><h5 class="fw-bold mb-3 small-muted">MY ACTIVE PROPERTIES</h5><div id="listings" class="row g-3 mb-5"></div><h5 class="fw-bold mb-3 small-muted">PENDING BOOKING REQUESTS</h5><div id="requests" class="mt-3"></div>`;
    
    console.log('Landlord dashboard - Current user ID:', user.id, 'User object:', user);
    const props = await getMyProperties();
    console.log('Properties fetched for landlord:', props, 'Count:', props.length);
    
    const listingsList = document.getElementById('listings');
    if(!props.length) {
      console.warn('No properties found for user ID:', user.id);
      listingsList.innerHTML = `<div class="p-5 text-center text-muted card shadow-none bg-light border-0 w-100">
        <h5>No properties listed.</h5>
        <p class="small mt-2">If you've added properties, check the browser console (F12) for debugging information.</p>
        <p class="small text-muted">You must be logged in with the same account that created the properties.</p>
      </div>`;
    }
    else listingsList.innerHTML = props.map(p => `
      <div class="col-md-6 w-100-mobile">
        <div class="card h-100 shadow-sm border-0 bg-light">
          <div class="card-body p-3">
            <h6 class="fw-bold mb-1">${p.title}</h6>
            <div class="small text-muted mb-3">${p.city} • Lease price: $${p.price}/mo • ${p.bedrooms} bed</div>
            <div class="d-flex gap-2 flex-wrap">
              <a href="property-details.html?id=${p.id}" class="btn btn-sm btn-outline-primary flex-grow-1">View</a>
              <button class="btn btn-sm btn-outline-danger btn-delete-prop" data-id="${p.id}" data-title="${p.title}">Delete</button>
            </div>
          </div>
        </div>
      </div>`).join('');

    // Delete property handler
    document.querySelectorAll('.btn-delete-prop').forEach(btn => {
      btn.onclick = async () => {
        const propId = btn.dataset.id;
        const propTitle = btn.dataset.title;
        if(confirm(`Are you sure you want to permanently delete "${propTitle}"? This action cannot be undone.`)){
          try{
            await deleteProperty(propId);
            alert('Property permanently deleted');
            location.reload();
          }catch(err){
            alert('Error deleting property: ' + err.message);
          }
        }
      };
    });

    const bookings = await fetchBookingsForUser(user.id);
    const pending = bookings.filter(b => b.status === 'pending');
    const reqDiv = document.getElementById('requests');
    if(!pending.length) reqDiv.innerHTML = '<div class="p-4 text-center text-muted">No pending responses required.</div>';
    else reqDiv.innerHTML = pending.map(b => `
      <div class="card p-3 mb-3 shadow-none border bg-light">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3">
          <div><div class="fw-bold mb-1">New Rent Inquiry</div><div class="small text-muted mb-1">"${b.message || 'No message provided'}"</div><div class="small text-muted">Requested Lease: ${b.start_date} to ${b.end_date}</div></div>
          <div class="btn-group shadow-sm w-100-mobile">
            <button class="btn btn-sm btn-success btn-approve" data-id="${b.id}">Approve</button>
            <button class="btn btn-sm btn-outline-danger btn-reject" data-id="${b.id}">Reject</button>
          </div>
        </div>
      </div>`).join('');
    
    document.querySelectorAll('.btn-approve').forEach(btn => btn.onclick = () => handleBookingAction(btn.dataset.id, 'approved'));
    document.querySelectorAll('.btn-reject').forEach(btn => btn.onclick = () => handleBookingAction(btn.dataset.id, 'rejected'));

  } else {
    // Tenant view
    main.innerHTML = `
      <h4 class="fw-bold mb-4">Resident Dashboard</h4>
      <div class="row g-4">
        <div class="col-12">
          <h5 class="fw-bold mb-3 small-muted">ACTIVE LEASES</h5>
          <div id="bookings-list" class="mb-5"></div>
        </div>
        <div class="col-12">
          <h5 class="fw-bold mb-3 small-muted">PAYMENT HISTORY</h5>
          <div id="payments-history" class="card border shadow-sm p-3 bg-light">
            <div class="text-center text-muted py-3">No payments recorded yet.</div>
          </div>
        </div>
      </div>`;
    
    const bookings = await fetchBookingsForUser(user.id);
    const bDiv = document.getElementById('bookings-list');
    const payHistoryDiv = document.getElementById('payments-history');
    
    if(!bookings.length) { bDiv.innerHTML = '<div class="p-5 text-center text-muted card shadow-none bg-light border-0"><h5>You haven\'t made any bookings yet.</h5></div>'; }
    else {
      const propertiesCache = {};
      const bookingsWithProps = await Promise.all(bookings.map(async b => {
        if(!propertiesCache[b.property_id]) propertiesCache[b.property_id] = (await fetchProperties({id: b.property_id}))[0];
        return { ...b, property: propertiesCache[b.property_id] };
      }));

      bDiv.innerHTML = bookingsWithProps.map(b => `
        <div class="card p-3 mb-3 border border-0 shadow-sm bg-light">
          <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3">
            <div>
              <div class="fw-bold mb-1 text-dark">${b.property?.title || 'Property Info Loading...'}</div>
              <div class="mb-2">
                <span class="badge ${b.status==='approved'?'bg-success':b.status==='rejected'?'bg-danger':'bg-warning'} status-badge">${b.status}</span>
                ${b.is_paid ? '<span class="badge bg-primary status-badge ms-md-1">Lease Active</span>' : ''}
              </div>
              <div class="small text-muted font-monospace">Lease: ${b.start_date} - ${b.end_date}</div>
            </div>
            <div class="text-end w-100-mobile">
              ${(b.status === 'approved') ? `<button class="btn btn-sm btn-success btn-pay-rent px-4" data-idx="${bookingsWithProps.indexOf(b)}">Pay Monthly Rent</button>` : ''}
              <a href="property-details.html?id=${b.property_id}" class="btn btn-sm btn-link text-decoration-none">Review Home</a>
            </div>
          </div>
        </div>`).join('');
      
      document.querySelectorAll('.btn-pay-rent').forEach(btn => btn.onclick = () => {
        currentPayBooking = bookingsWithProps[btn.dataset.idx];
        const modal = new bootstrap.Modal(document.getElementById('paymentModal'));
        document.getElementById('pay-booking-ref').innerText = currentPayBooking.id.slice(0,8).toUpperCase();
        document.getElementById('pay-property-title').innerText = currentPayBooking.property.title;
        document.getElementById('pay-amount').innerText = `$${currentPayBooking.property.price}`;
        modal.show();
      });
    }

    // Load payment history
    const payments = await fetchPayments(user.id);
    if(payments.length) {
      payHistoryDiv.innerHTML = `
        <div class="table-responsive">
          <table class="table table-sm table-borderless m-0">
            <thead class="text-muted small-muted">
              <tr><th>Month</th><th>Property</th><th class="text-end">Amount</th><th></th></tr>
            </thead>
            <tbody>
              ${payments.map(p => `
                <tr class="align-middle border-bottom">
                  <td><strong>${p.month}</strong></td>
                  <td class="small text-muted">${p.bookings?.properties?.title}</td>
                  <td class="text-end">$${p.amount}</td>
                  <td class="text-end"><button class="btn btn-link btn-sm text-primary p-0 btn-receipt" data-pid="${p.id}">Download</button></td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
      
      document.querySelectorAll('.btn-receipt').forEach(btn => btn.onclick = () => {
        const p = payments.find(pay => pay.id === btn.dataset.pid);
        const b = bookings.find(book => book.id === p.booking_id);
        const prop = p.bookings?.properties;
        generateInvoice(b, prop, 'RECEIPT', p.month);
      });
    }
  }
})();

window.confirmPayment = async function() {
  const btn = document.getElementById('btn-confirm-pay');
  const month = document.getElementById('pay-month').value;
  if(!currentPayBooking || !month) { alert('Please select a month'); return; }
  
  btn.disabled = true; btn.innerText = 'Verifying with Bank...';
  try {
    // Save payment record
    await payRentByMonth({ 
      booking_id: currentPayBooking.id, 
      tenant_id: getLocalUser().id, 
      amount: currentPayBooking.property.price, 
      month 
    });
    // Mark booking as paid if first time (optional, keep it consistent)
    if(!currentPayBooking.is_paid) await payBooking(currentPayBooking.id);
    
    location.reload();
  } catch(e) {
    alert('Secure Transaction Error: ' + e.message);
    btn.disabled = false; btn.innerText = 'Retry Payment';
  }
}
</script>

<!-- Payment Modal -->
<div class="modal fade" id="paymentModal" data-bs-backdrop="static" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg px-2">
      <div class="modal-header border-0 pb-0"><h5 class="modal-title fw-bold">Rent Payment</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body py-4">
        <div class="bg-light p-3 rounded-4 mb-4">
          <div class="row align-items-center">
            <div class="col-6"><p class="small text-muted mb-0 fw-bold">PROPERTY</p><div id="pay-property-title" class="small fw-bold text-dark"></div></div>
            <div class="col-6 text-end"><p class="small text-muted mb-0 fw-bold">TOTAL DUE</p><div id="pay-amount" class="h5 fw-bold text-primary m-0"></div></div>
          </div>
        </div>

        <div class="mb-4">
          <label class="small fw-bold text-muted mb-2">SELECT RENT MONTH</label>
          <select id="pay-month" class="form-select border-primary-subtle">
            <option value="">Choose Month...</option>
            <option value="January 2024">January 2024</option>
            <option value="February 2024">February 2024</option>
            <option value="March 2024">March 2024</option>
            <option value="April 2024">April 2024</option>
            <option value="May 2024">May 2024</option>
            <option value="June 2024">June 2024</option>
          </select>
        </div>

        <div class="mb-4 d-flex gap-2">
           <div class="card flex-fill p-3 border-0 bg-light text-start shadow-none">
              <label class="small text-muted mb-2 fw-bold">SAVED PAYMENT METHOD</label>
              <div class="d-flex align-items-center gap-2">
                 <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
                 <span class="text-muted small">VISA ending in 4242</span>
              </div>
           </div>
        </div>
        <div class="text-center">
          <p class="small text-muted mb-0 px-3">By clicking below, you authorize the secure transaction and will receive a digital receipt.</p>
        </div>
      </div>
      <div class="modal-footer border-0 pt-0 mt-2 px-4 pb-4">
        <div class="d-flex gap-2 w-100">
           <button class="btn btn-outline-secondary w-50 py-3 fw-bold" data-bs-dismiss="modal">Cancel</button>
           <button id="btn-confirm-pay" class="btn btn-primary w-50 fw-bold py-3" onclick="confirmPayment()">Approve Payment</button>
        </div>
        <div class="w-100 text-center mt-3"><small class="text-muted">Ref: <span id="pay-booking-ref"></span></small></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
