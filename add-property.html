<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Add Property - Rent a Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary"><div class="container"><a class="navbar-brand" href="index.html">Rent a Home</a><div id="nav-auth" class="ms-auto"></div></div></nav>
<section class="container py-3 py-md-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-7">
      <div class="card p-3 p-md-4 border-0 shadow-sm">
        <h4 class="fw-bold mb-3">Add Property</h4>
        <div id="msg"></div>
        <form id="prop-form">
          <div class="mb-3">
            <label class="form-label fw-500">Title *</label>
            <input id="title" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-500">City *</label>
            <input id="city" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-500">Address</label>
            <input id="address" class="form-control">
          </div>
          <div class="row g-2 g-md-3">
            <div class="col-12 col-sm-4 mb-3">
              <label class="form-label fw-500">Price ($/mo) *</label>
              <input id="price" type="number" class="form-control" required>
            </div>
            <div class="col-12 col-sm-4 mb-3">
              <label class="form-label fw-500">Bedrooms</label>
              <input id="bedrooms" type="number" class="form-control" value="1">
            </div>
            <div class="col-12 col-sm-4 mb-3">
              <label class="form-label fw-500">Bathrooms</label>
              <input id="bathrooms" type="number" class="form-control" value="1">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-500">Description</label>
            <textarea id="description" class="form-control" rows="4"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label fw-500">Amenities (comma separated)</label>
            <input id="amenities" class="form-control" placeholder="WiFi, Parking, Pool, Gym">
          </div>
          <div class="mb-4">
            <label class="form-label fw-500">Image URL</label>
            <input id="imageUrl" class="form-control" placeholder="https://example.com/image.jpg">
            <small class="text-muted d-block mt-1">Provide a direct image URL (jpeg/png)</small>
          </div>
          <button class="btn btn-primary btn-lg w-100">Add Property</button>
        </form>
      </div>
    </div>
  </div>
</section>
<script type="module">
import { requireAuth, isLandlord } from './js/auth.js';
import { addProperty } from './js/properties.js';
import { supabase, getUserId } from './js/supabaseClient.js';
import { initNavbar } from './js/app.js';

initNavbar();
requireAuth();
const form = document.getElementById('prop-form');
const msg = document.getElementById('msg');

if(!isLandlord()){
  msg.innerHTML = '<div class="alert alert-danger">Only landlords can list properties. Please update your role in your profile if you wish to list property.</div>';
  form.querySelectorAll('input, textarea, button').forEach(el => el.disabled = true);
}
form.addEventListener('submit', async (e)=>{
  e.preventDefault(); msg.innerHTML = '';
  // ensure authenticated session
  const userRes = await supabase.auth.getUser();
  const currentUser = userRes?.data?.user;
  if(!currentUser){ msg.innerHTML = '<div class="alert alert-warning">Please log in before adding a property.</div>'; return; }
  const title = document.getElementById('title').value;
  const city = document.getElementById('city').value;
  const address = document.getElementById('address').value;
  const price = document.getElementById('price').value;
  const bedrooms = parseInt(document.getElementById('bedrooms').value||1);
  const bathrooms = parseInt(document.getElementById('bathrooms').value||1);
  const description = document.getElementById('description').value;
  const amenities = document.getElementById('amenities').value.split(',').map(s=>s.trim()).filter(Boolean);
  const imageUrl = document.getElementById('imageUrl').value;
  try{
    // pass owner explicitly from authenticated session to avoid RLS mismatch
    const created = await addProperty({ owner: currentUser.id, title, description, city, address, price, bedrooms, bathrooms, amenities, imageUrl });
    msg.innerHTML = '<div class="alert alert-success">Property added</div>';
    setTimeout(()=> location.href = `property-details.html?id=${created.id}`, 800);
  }catch(err){ msg.innerHTML = `<div class="alert alert-danger">${err.message}</div>`; }
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
